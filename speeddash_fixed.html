<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SpeedDash ∞</title>
    <style>
        body { margin:0; background:#0a0a1f; font-family:'Courier New',monospace; color:#0ff; overflow:hidden; touch-action:none; }
        canvas { display:block; margin:0 auto; image-rendering:pixelated; max-width:100%; }
        .overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(5,5,30,0.97); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:200; }
        button { background:#112; color:#0ff; border:2px solid #0ff; padding:12px; margin:6px; cursor:pointer; width:260px; }
        #mod-btn { position:absolute; top:15px; right:15px; z-index:60; background:#f0f; color:#000; padding:10px 18px; font-weight:bold; border-radius:8px; }
        #mobile-controls { position:absolute; bottom:20px; left:20px; right:20px; z-index:50; display:flex; justify-content:space-between; align-items:flex-end; }
        #jump-btn { background:rgba(255,220,0,0.5); border:5px solid #ff0; width:90px; height:90px; border-radius:50%; font-size:18px; font-weight:bold; display:flex; align-items:center; justify-content:center; user-select:none; }
        #joystick-container { position:relative; width:130px; height:130px; }
        #joystick-base { width:130px; height:130px; background:rgba(0,255,255,0.25); border:6px solid #0ff; border-radius:50%; }
        #joystick-knob { position:absolute; width:55px; height:55px; background:#0ff; border-radius:50%; top:37px; left:37px; box-shadow:0 0 25px #0ff; pointer-events:none; }
    </style>
</head>
<body>
    <div id="ui" style="position:absolute;top:10px;left:10px;z-index:10;background:rgba(0,0,0,0.8);padding:8px 14px;border:2px solid #0ff;">
        <div id="timer">TIME: 0.00s</div>
    </div>

    <button id="mod-btn" onclick="toggleModMenu()">MOD MENU</button>

    <div id="main-menu" class="overlay" style="display:flex;">
        <h1>SPEEDDASH ∞</h1>
        <button onclick="startGame()">START RUN</button>
        <button onclick="showPassword()">DEV PASSWORD</button>
    </div>

    <div id="password-screen" class="overlay">
        <h2>ENTER CODE</h2>
        <div id="pass-display" style="font-size:48px;letter-spacing:25px;background:#000;padding:20px 70px;margin:30px;color:#0f0;">••••</div>
        <div style="display:grid;grid-template-columns:repeat(3,85px);gap:15px;" id="keypad"></div>
        <button onclick="hidePassword()">BACK</button>
    </div>

    <div id="modmenu" class="overlay">
        <h2>🔧 MOD MENU</h2>
        <button onclick="toggleGod()">God Mode</button>
        <button onclick="toggleNoClip()">No Clip</button>
        <button onclick="toggleFly()">Fly Mode</button>
        <button onclick="setSpeed(3)">Speed x3</button>
        <button onclick="setSpeed(0.3)">Slow Motion</button>
        <button onclick="toggleHighJump()">High Jump</button>
        <button onclick="toggleInfJump()">Infinite Jump</button>
        <button onclick="toggleFreeze()">Freeze Timer</button>
        <button onclick="resetRun()">Restart Run</button>
        <button onclick="toggleModMenu()" style="background:#411;">CLOSE</button>
    </div>

    <canvas id="game" width="800" height="400"></canvas>

    <div id="mobile-controls">
        <div id="jump-btn">JUMP</div>
        <div id="joystick-container">
            <div id="joystick-base"></div>
            <div id="joystick-knob"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let player = {x:80, y:220, vx:0, vy:0, w:28, h:40, onGround:false};
        let platforms = [];
        let goals = [];
        let time = 0, gameRunning = false;
        let godMode = false, noClip = false, flyMode = false, timerFrozen = false, highJump = false, infJump = false;
        let speedMult = 1;
        let keys = {};
        let joystickX = 0;
        let cameraX = 0;
        let nextGoalX = 900;
        let modUnlocked = false;

        function generateSection(startX) {
            for (let i = 0; i < 8; i++) {
                platforms.push({x: startX + i*130 + Math.random()*80, y: 160 + Math.random()*170, w: 85 + Math.random()*70, h: 18});
            }
            goals.push({x: startX + 1050, y: 110, w: 40, h: 80});
            nextGoalX = startX + 1350;
        }

        function update() {
            if (!gameRunning) return;

            // FIX 1: Freeze Timer only freezes the clock — player still moves normally.
            // Previously timerFrozen also stopped the entire update, which froze the player.
            if (!timerFrozen) time += 1/60;

            let ax = (keys['ArrowRight']||keys['d']?1:0) - (keys['ArrowLeft']||keys['a']?1:0) + joystickX;
            player.vx += ax * 1.65 * speedMult;
            player.vx *= 0.83;

            if (keys[' '] && (player.onGround || flyMode || godMode || infJump)) {
                player.vy = (flyMode||godMode) ? -9 : -16.5 * (highJump?1.7:1);
                player.onGround = false;
            }

            if (!godMode && !flyMode) player.vy += 0.82;
            player.x += player.vx;
            player.y += player.vy;
            player.onGround = false;

            if (!noClip && !godMode) {
                for (let p of platforms) {
                    if (player.x + player.w > p.x && player.x < p.x + p.w && player.y + player.h > p.y && player.y < p.y + p.h) {
                        if (player.vy > 0) { player.y = p.y - player.h; player.vy = 0; player.onGround = true; }
                    }
                }
            }

            if (player.y > 650) resetRun();

            cameraX = Math.max(0, player.x - 320);

            if (player.x > nextGoalX - 800) generateSection(nextGoalX);

            for (let i = goals.length-1; i >= 0; i--) {
                let g = goals[i];
                if (player.x + player.w > g.x && player.x < g.x + g.w && player.y + player.h > g.y && player.y < g.y + g.h) goals.splice(i,1);
            }
        }

        function draw() {
            ctx.fillStyle = '#0a0a1f'; ctx.fillRect(0,0,800,400);
            ctx.fillStyle = '#0f0';
            for (let p of platforms) {
                let sx = p.x - cameraX;
                if (sx > -100 && sx < 900) ctx.fillRect(sx, p.y, p.w, p.h);
            }

            ctx.fillStyle = '#f00';
            for (let g of goals) {
                let gx = g.x - cameraX;
                ctx.fillRect(gx + 10, g.y, 8, g.h);
                ctx.fillStyle = '#ff0';
                ctx.beginPath();
                ctx.moveTo(gx + 18, g.y + 15);
                ctx.lineTo(gx + 48, g.y + 32);
                ctx.lineTo(gx + 18, g.y + 48);
                ctx.fill();
                ctx.fillStyle = '#f00';
            }

            ctx.fillStyle = godMode ? '#f0f' : '#0ff';
            ctx.fillRect(player.x - cameraX, player.y, player.w, player.h);

            document.getElementById('timer').textContent = `TIME: ${time.toFixed(2)}s`;
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

        function resetRun() {
            player.x = 80; player.y = 220; player.vx = player.vy = 0;
            platforms = []; goals = []; cameraX = 0; nextGoalX = 900;
            generateSection(0);
        }

        function toggleGod() { godMode = !godMode; }
        function toggleNoClip() { noClip = !noClip; }
        function toggleFly() { flyMode = !flyMode; }
        function setSpeed(s) { speedMult = s; }
        function toggleHighJump() { highJump = !highJump; }
        function toggleInfJump() { infJump = !infJump; }
        function toggleFreeze() { timerFrozen = !timerFrozen; }

        function startGame() {
            document.getElementById('main-menu').style.display = 'none';
            gameRunning = true;
            resetRun();
            if (modUnlocked) document.getElementById('mod-btn').style.display = 'block';
        }

        function showPassword() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('password-screen').style.display = 'flex';
            passwordInput = ''; updatePassDisplay(); createKeypad();
        }

        let passwordInput = '';
        function updatePassDisplay() {
            document.getElementById('pass-display').textContent = '••••'.substring(0, passwordInput.length) + '••••'.substring(passwordInput.length);
        }
        function createKeypad() {
            let kp = document.getElementById('keypad');
            kp.innerHTML = '';
            for(let i=0;i<10;i++) {
                let k = document.createElement('div');
                k.className = 'key';
                k.textContent = i;
                k.style.cssText = 'background:#112;color:#0ff;border:2px solid #0ff;padding:12px;cursor:pointer;text-align:center;font-size:20px;';
                k.onclick = () => {
                    passwordInput += i;
                    updatePassDisplay();
                    if(passwordInput === '2015') {
                        modUnlocked = true;
                        setTimeout(() => { hidePassword(); document.getElementById('mod-btn').style.display = 'block'; }, 300);
                    }
                };
                kp.appendChild(k);
            }
        }
        function hidePassword() {
            document.getElementById('password-screen').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
        }

        function toggleModMenu() {
            const menu = document.getElementById('modmenu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        window.addEventListener('keydown', e => { keys[e.key] = true; if (e.key.toLowerCase() === 'm' && modUnlocked) toggleModMenu(); });
        window.addEventListener('keyup', e => keys[e.key] = false);

        // FIX 2: Joystick — knob element was referenced via a bare `knob` variable inside
        // updateJoystick(), but `knob` was only declared inside setupMobile() and therefore
        // out of scope when updateJoystick() ran. Moved the element references to module
        // scope so both functions can access them.
        const joystickKnob = document.getElementById('joystick-knob');
        const joystickContainer = document.getElementById('joystick-container');

        function setupMobile() {
            const jumpBtn = document.getElementById('jump-btn');

            jumpBtn.addEventListener('touchstart', e => {
                e.preventDefault();
                keys[' '] = true;
                if (player.onGround || flyMode || godMode || infJump) {
                    player.vy = (flyMode || godMode) ? -9 : -16.5 * (highJump ? 1.7 : 1);
                }
            });
            jumpBtn.addEventListener('touchend', () => keys[' '] = false);

            joystickContainer.addEventListener('touchstart', e => { e.preventDefault(); updateJoystick(e.touches[0]); });
            joystickContainer.addEventListener('touchmove',  e => { e.preventDefault(); updateJoystick(e.touches[0]); });
            joystickContainer.addEventListener('touchend',   () => {
                joystickKnob.style.transform = 'translate(0px, 0px)';
                joystickX = 0;
            });
        }

        function updateJoystick(touch) {
            const rect = joystickContainer.getBoundingClientRect();
            let dx = touch.clientX - rect.left - 65;
            dx = Math.max(-48, Math.min(48, dx));
            joystickKnob.style.transform = `translate(${dx}px, 0px)`;
            joystickX = dx / 48;
        }

        setupMobile();
        gameLoop();
    </script>
</body>
</html>
